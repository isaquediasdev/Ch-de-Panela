<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Chá de Panelas</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">Chá de <span>Panelas</span></a>
      <ul class="nav-links">
        <li><a href="/lista.html">Lista de Presentes</a></li>
        <li><a href="/carrinho.html" class="nav-cart">🛒 Carrinho <span class="cart-badge"></span></a></li>
      </ul>
      <div id="nav-user-area"></div>
    </div>
  </nav>

  <div class="form-page">
    <div class="container-sm" style="width:100%;">
      <div class="form-card">
        <h1>Entrar</h1>
        <p class="form-subtitle">Acesse sua conta para reservar presentes</p>

        <div class="form-error" id="form-error"></div>

        <form id="login-form" novalidate>
          <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="seu@email.com" autocomplete="email" required />
          </div>
          <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" id="password" name="password" placeholder="Sua senha" autocomplete="current-password" required />
          </div>

          <button type="submit" class="btn btn-primary btn-full" id="submit-btn">
            Entrar
          </button>
        </form>

        <p class="form-alt">
          Ainda não tem conta? <a id="register-link" href="/cadastro.html">Cadastre-se</a>
        </p>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <p class="footer-names" data-config="nomes">[Nome da Noiva] &amp; [Nome do Noivo]</p>
  </footer>

  <script src="/js/app.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const redirect = params.get('redirect') || '/lista.html';

    // Update register link to preserve redirect
    const registerLink = document.getElementById('register-link');
    if (redirect !== '/lista.html') {
      registerLink.href = `/cadastro.html?redirect=${encodeURIComponent(redirect)}`;
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('form-error');
      const btn = document.getElementById('submit-btn');
      errorEl.classList.remove('visible');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        errorEl.textContent = 'Preencha todos os campos.';
        errorEl.classList.add('visible');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Entrando...';

      const res = await App.apiFetch('/api/auth/login', {
        method: 'POST',
        body: { email, password },
      });

      if (res.ok) {
        App.showToast('Bem-vindo(a) de volta! 💕', 'success');
        setTimeout(() => { window.location.href = redirect; }, 500);
      } else {
        errorEl.textContent = res.error || 'E-mail ou senha incorretos.';
        errorEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
