<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedido Confirmado — Chá de Panelas</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .card-coming { text-align:center; padding:24px 16px; }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">Chá de <span>Panelas</span></a>
      <ul class="nav-links">
        <li><a href="/lista.html">Lista de Presentes</a></li>
        <li><a href="/carrinho.html" class="nav-cart">🛒 Carrinho <span class="cart-badge"></span></a></li>
      </ul>
      <div id="nav-user-area"></div>
    </div>
  </nav>

  <div class="confirm-page" id="confirm-page">
    <div class="skeleton" style="height:80px;width:80px;border-radius:50%;margin:0 auto 24px;"></div>
    <div class="skeleton" style="height:40px;width:70%;margin:0 auto 12px;"></div>
    <div class="skeleton" style="height:20px;width:85%;margin:0 auto 36px;"></div>
    <div class="skeleton" style="height:200px;border-radius:10px;margin-bottom:20px;"></div>
    <div class="skeleton" style="height:220px;border-radius:10px;"></div>
  </div>

  <footer>
    <p class="footer-names" data-config="nomes">Ana Clara &amp; Isaque</p>
    <p data-config="dataEvento">20 de junho de 2026</p>
  </footer>

  <script src="/js/app.js"></script>
  <script>
    async function loadConfirmation() {
      const page = document.getElementById('confirm-page');
      const params = new URLSearchParams(window.location.search);
      const orderIdRaw = params.get('orderId');
      const orderId = parseInt(orderIdRaw, 10); // UUID da InfinitePay vira NaN → fallback pro mais recente

      const [ordersRes, configRes] = await Promise.all([
        App.apiFetch('/api/orders/me'),
        App.apiFetch('/api/config'),
      ]);

      if (!ordersRes.ok) { window.location.href = '/login.html'; return; }

      const orders = ordersRes.data;
      // orderId pode ser UUID (InfinitePay) — parseInt retorna NaN → pega o mais recente
      const order = (orderId && !isNaN(orderId) ? orders.find(o => o.id === orderId) : null) || orders[0];

      if (!order) {
        page.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">😕</div>
            <h2>Pedido não encontrado</h2>
            <a href="/lista.html" class="btn btn-primary">Ver Lista de Presentes</a>
          </div>`;
        return;
      }

      const cfg = configRes.ok ? configRes.data : {};
      const bank = cfg.bank || {};

      page.innerHTML = `
        <div class="confirm-icon">💝</div>
        <h1>Obrigada pelo seu presente!</h1>
        <p class="lead">
          ${order.items.length === 1 ? 'Seu presente foi' : 'Seus presentes foram'} reservado${order.items.length === 1 ? '' : 's'} com sucesso.
          Agora escolha como enviar o valor e finalize sua participação!
        </p>

        <div class="order-items-list">
          <p style="font-size:0.8rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:12px;font-weight:700;">
            Presentes Reservados
          </p>
          ${order.items.map(item => `
            <div class="order-item-row">
              <div class="order-item-name">
                <span>${item.emoji || '🎁'}</span>
                <span>${App.escapeHtml(item.name)}</span>
              </div>
              <span style="font-weight:700;color:var(--gold-dark);white-space:nowrap;">${App.formatPrice(item.price)}</span>
            </div>
          `).join('')}
          <div class="order-item-row" style="padding-top:14px;margin-top:4px;border-top:2px solid var(--border);border-bottom:none;">
            <strong>Total a enviar</strong>
            <strong style="color:var(--gold-dark);font-size:1.1rem;">${App.formatPrice(order.total)}</strong>
          </div>
        </div>

        <div class="pix-box" style="padding:24px;text-align:center;">
          <div style="font-size:2.5rem;margin-bottom:12px;">💵</div>
          <h3 style="margin-bottom:8px;">Pagar em dinheiro</h3>
          <p style="font-size:0.9rem;color:var(--text-muted);margin-bottom:24px;">
            Seu presente está reservado! É só trazer
            <strong style="color:var(--gold-dark);">${App.formatPrice(order.total)}</strong>
            em dinheiro no dia do chá e entregar aos noivos. 💝
          </p>
          <div id="panel-cash">
            <button id="btn-cash" class="btn btn-primary" style="width:100%;padding:14px;" onclick="confirmCash(${order.id})">
              Confirmar — vou pagar no dia
            </button>
            <p style="font-size:0.75rem;color:var(--text-muted);margin-top:10px;">
              Os noivos serão avisados da sua escolha 🎁
            </p>
          </div>
        </div>

        <a href="/lista.html" class="btn btn-outline" style="margin-bottom:12px;">Ver Lista de Presentes</a>
      `;

    }

    async function confirmCash(orderId) {
      const btn = document.getElementById('btn-cash');
      if (btn) { btn.disabled = true; btn.textContent = 'Confirmando...'; }
      const res = await App.apiFetch(`/api/orders/${orderId}/cash`, { method: 'POST' });
      const panel = document.getElementById('panel-cash');
      if (res.ok && panel) {
        panel.innerHTML = `
          <div class="card-coming">
            <div class="big-icon">🎉</div>
            <h3 style="margin-bottom:8px;">Combinado!</h3>
            <p style="color:var(--text-muted);">
              Seu presente está reservado no seu nome. É só trazer o valor no dia
              do chá e entregar para os noivos. Muito obrigada! 💕
            </p>
          </div>`;
      } else {
        App.showToast(res.error || 'Erro ao confirmar. Tente novamente.', 'error');
        if (btn) { btn.disabled = false; btn.textContent = 'Vou pagar em dinheiro no dia'; }
      }
    }

    document.addEventListener('DOMContentLoaded', loadConfirmation);
  </script>
</body>
</html>
