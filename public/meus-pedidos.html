<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meus Pedidos — Chá de Panelas</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .order-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .order-card-head {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 8px; margin-bottom: 12px;
    }
    .order-card-foot {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 8px;
      padding-top: 14px; margin-top: 6px;
      border-top: 2px solid var(--border);
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">Chá de <span>Panelas</span></a>
      <ul class="nav-links">
        <li><a href="/lista.html" class="nav-link-text">Lista de Presentes</a></li>
        <li><a href="/carrinho.html" class="nav-cart">🛒 Carrinho <span class="cart-badge"></span></a></li>
      </ul>
      <div id="nav-user-area"></div>
    </div>
  </nav>

  <div class="cart-page">
    <div style="margin-bottom:24px;">
      <a href="/lista.html" class="back-link">← Lista de Presentes</a>
      <h1 style="font-size:2rem;">Minha Conta</h1>
    </div>

    <!-- Dados do usuário -->
    <div id="user-info" style="background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:28px;display:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <p style="font-size:0.75rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);font-weight:700;margin:0;">Seus dados</p>
        <button onclick="toggleEdit()" id="edit-btn" style="background:none;border:none;color:var(--gold-dark);font-size:0.85rem;cursor:pointer;font-family:inherit;font-weight:700;padding:4px 8px;">✏️ Editar</button>
      </div>

      <!-- Modo visualização -->
      <div id="user-view" style="display:flex;flex-direction:column;gap:6px;">
        <div style="font-size:0.95rem;"><strong id="user-name"></strong></div>
        <div style="font-size:0.88rem;color:var(--text-muted);" id="user-email"></div>
      </div>

      <!-- Modo edição -->
      <div id="user-edit" style="display:none;">
        <div class="form-group" style="margin-bottom:12px;">
          <label for="edit-name" style="font-size:0.78rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);font-weight:700;display:block;margin-bottom:6px;">Nome</label>
          <input type="text" id="edit-name" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:0.95rem;" />
        </div>
        <div class="form-group" style="margin-bottom:16px;">
          <label for="edit-email" style="font-size:0.78rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);font-weight:700;display:block;margin-bottom:6px;">E-mail</label>
          <input type="email" id="edit-email" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:0.95rem;" />
        </div>
        <div style="display:flex;gap:10px;">
          <button onclick="saveUser()" id="save-btn" class="btn btn-primary" style="flex:1;padding:10px;">Salvar</button>
          <button onclick="toggleEdit()" class="btn btn-outline" style="flex:1;padding:10px;">Cancelar</button>
        </div>
      </div>
    </div>

    <h2 style="font-size:1.3rem;margin-bottom:16px;">Pedidos Recentes</h2>
    <p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:20px;">Aqui ficam os presentes que você reservou e comprou.</p>

    <div id="orders-content">
      <div class="skeleton" style="height:140px;border-radius:12px;margin-bottom:16px;"></div>
      <div class="skeleton" style="height:140px;border-radius:12px;"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <p class="footer-names" data-config="nomes">Ana Clara &amp; Isaque</p>
  </footer>

  <script src="/js/app.js"></script>
  <script>
    async function checkAuth() {
      const res = await App.apiFetch('/api/auth/me');
      if (!res.ok) {
        window.location.href = '/login.html?redirect=/meus-pedidos.html';
        return false;
      }
      // Exibe dados do usuário
      const u = res.data;
      document.getElementById('user-name').textContent = u.name || '';
      document.getElementById('user-email').textContent = u.email || '';
      document.getElementById('user-info').style.display = 'block';
      return true;
    }

    async function loadOrders() {
      const content = document.getElementById('orders-content');
      const res = await App.apiFetch('/api/orders/me');

      if (!res.ok) {
        content.innerHTML = `<p style="color:var(--red)">Erro ao carregar seus pedidos.</p>`;
        return;
      }

      const orders = res.data;

      if (orders.length === 0) {
        content.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🎁</div>
            <h2>Você ainda não tem pedidos</h2>
            <p>Escolha um presente da nossa lista para começar.</p>
            <a href="/lista.html" class="btn btn-primary">Ver Lista de Presentes</a>
          </div>
        `;
        return;
      }

      const payMap = { dinheiro: '💵 Dinheiro', pix: '📱 PIX', credit_card: '💳 Cartão' };

      content.innerHTML = orders.map(order => {
        const date = new Date(order.created_at.replace(' ', 'T')).toLocaleDateString('pt-BR', {
          day: '2-digit', month: 'long', year: 'numeric'
        });
        const isPaid = order.status === 'paid';
        const statusBadge = isPaid
          ? `<span class="badge badge-paid">Pago</span>`
          : `<span class="badge badge-pending">Aguardando pagamento</span>`;
        const pay = payMap[order.payment_method] || '';

        return `
          <div class="order-card">
            <div class="order-card-head">
              <strong>Pedido #${order.id}</strong>
              <span style="font-size:0.82rem;color:var(--text-muted);">${date}</span>
            </div>
            ${order.items.map(it => `
              <div class="order-item-row">
                <div class="order-item-name">
                  <span>${it.emoji || '🎁'}</span>
                  <span>${App.escapeHtml(it.name)}</span>
                </div>
                <span style="font-weight:700;color:var(--gold-dark);white-space:nowrap;">${App.formatPrice(it.price)}</span>
              </div>
            `).join('')}
            <div class="order-card-foot">
              <span>${statusBadge}${pay ? `<span style="font-size:0.82rem;color:var(--text-muted);margin-left:8px;">${pay}</span>` : ''}</span>
              <strong style="color:var(--gold-dark);font-size:1.1rem;">${App.formatPrice(order.total)}</strong>
            </div>
            ${isPaid ? '' : `
              <a href="/confirmacao.html?orderId=${order.id}" class="btn btn-primary btn-full" style="margin-top:14px;">Finalizar pagamento</a>
              <button onclick="cancelOrder(${order.id})" class="btn btn-danger btn-full" style="margin-top:8px;">Cancelar reserva</button>
            `}
          </div>
        `;
      }).join('');
    }

    function toggleEdit() {
      const view = document.getElementById('user-view');
      const edit = document.getElementById('user-edit');
      const btn  = document.getElementById('edit-btn');
      const isEditing = edit.style.display !== 'none';
      if (isEditing) {
        view.style.display = 'flex';
        edit.style.display = 'none';
        btn.textContent = '✏️ Editar';
      } else {
        document.getElementById('edit-name').value = document.getElementById('user-name').textContent;
        document.getElementById('edit-email').value = document.getElementById('user-email').textContent;
        view.style.display = 'none';
        edit.style.display = 'block';
        btn.textContent = '✕ Fechar';
        document.getElementById('edit-name').focus();
      }
    }

    async function saveUser() {
      const btn  = document.getElementById('save-btn');
      const name  = document.getElementById('edit-name').value.trim();
      const email = document.getElementById('edit-email').value.trim();
      if (!name || !email) { App.showToast('Preencha nome e e-mail', 'error'); return; }
      btn.disabled = true; btn.textContent = 'Salvando…';
      const res = await App.apiFetch('/api/auth/me', { method: 'PUT', body: JSON.stringify({ name, email }) });
      if (res.ok) {
        document.getElementById('user-name').textContent = name;
        document.getElementById('user-email').textContent = email;
        App.showToast('Dados atualizados!', 'success');
        toggleEdit();
      } else {
        App.showToast(res.error || 'Erro ao salvar', 'error');
      }
      btn.disabled = false; btn.textContent = 'Salvar';
    }

    async function cancelOrder(orderId) {
      if (!confirm('Tem certeza que quer cancelar essa reserva? O item voltará para a lista.')) return;
      const res = await App.apiFetch(`/api/orders/${orderId}`, { method: 'DELETE' });
      if (res.ok) {
        App.showToast('Reserva cancelada. O item voltou para a lista.', 'info');
        await loadOrders();
      } else {
        App.showToast(res.error || 'Erro ao cancelar pedido', 'error');
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const authed = await checkAuth();
      if (authed) await loadOrders();
    });
  </script>
</body>
</html>
