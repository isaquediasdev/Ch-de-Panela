<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Presentes — Chá de Panelas</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .gift-img-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      margin: 0 auto 12px;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
      border: 1px solid var(--border);
    }
    .gift-img {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
      padding: 6px;
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">Chá de <span>Panelas</span></a>
      <ul class="nav-links">
        <li><a href="/lista.html">Lista de Presentes</a></li>
        <li><a href="/carrinho.html" class="nav-cart">🛒 Carrinho <span class="cart-badge"></span></a></li>
      </ul>
      <div id="nav-user-area"></div>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <h1>Lista de Presentes</h1>
    <p class="subtitle">Escolha o presente que tocar no seu coração 💝</p>
  </div>

  <!-- FILTER TABS -->
  <div class="filter-tabs" id="filter-tabs">
    <button class="filter-tab active" data-cat="Todos">Todos</button>
    <button class="filter-tab" data-cat="Cama">🛏 Cama</button>
    <button class="filter-tab" data-cat="Banho">🛁 Banho</button>
    <button class="filter-tab" data-cat="Mesa">🍽 Mesa</button>
    <button class="filter-tab" data-cat="Cozinha">🍳 Cozinha</button>
    <button class="filter-tab" data-cat="Organização">🫙 Organização</button>
  </div>

  <!-- GIFT GRID -->
  <div class="container">
    <div class="gift-grid" id="gift-grid">
      <!-- Skeleton placeholders -->
      <div class="gift-card skeleton-card skeleton"></div>
      <div class="gift-card skeleton-card skeleton"></div>
      <div class="gift-card skeleton-card skeleton"></div>
      <div class="gift-card skeleton-card skeleton"></div>
      <div class="gift-card skeleton-card skeleton"></div>
      <div class="gift-card skeleton-card skeleton"></div>
      <div class="gift-card skeleton-card skeleton"></div>
      <div class="gift-card skeleton-card skeleton"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <p class="footer-names" data-config="nomes">Ana Clara &amp; Isaque</p>
  </footer>

  <script src="/js/app.js"></script>
  <script>
    let allItems = [];
    let activeFilter = 'Todos';

    async function loadItems() {
      const grid = document.getElementById('gift-grid');
      try {
        const res = await App.apiFetch('/api/items');
        if (!res.ok) throw new Error(res.error || 'Erro');
        allItems = res.data;
        renderGrid();
      } catch (e) {
        grid.innerHTML = `<p style="color:var(--red);padding:40px 0;grid-column:1/-1;text-align:center">Erro ao carregar lista. Recarregue a página.</p>`;
      }
    }

    function renderGrid() {
      const grid = document.getElementById('gift-grid');
      const filtered = activeFilter === 'Todos'
        ? allItems
        : allItems.filter(i => i.cat === activeFilter);

      if (filtered.length === 0) {
        grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--text-muted)">Nenhum item nesta categoria.</p>`;
        return;
      }

      // disponíveis no topo, reservados/comprados no final
      const ordered = [...filtered].sort((a, b) => (a.reserved ? 1 : 0) - (b.reserved ? 1 : 0));

      grid.innerHTML = ordered.map(item => {
        const media = item.image
          ? `<div class="gift-img-wrap"><img src="${App.escapeHtml(item.image)}" alt="${App.escapeHtml(item.name)}" class="gift-img" loading="lazy" /></div>`
          : `<div class="gift-emoji">${item.emoji}</div>`;
        const badgeText = item.paid ? 'Comprado' : (item.reserved ? 'Reservado' : 'Disponível');
        const badgeClass = item.reserved ? 'badge-reserved' : 'badge-available';
        const inner = `
          ${media}
          <div class="gift-name">${App.escapeHtml(item.name)}</div>
          <div class="gift-price">${App.formatPrice(item.price)}</div>
          <div><span class="badge ${badgeClass}">${badgeText}</span></div>
        `;
        if (item.reserved) {
          return `<div class="gift-card reserved" aria-label="${App.escapeHtml(item.name)} — ${badgeText}">${inner}</div>`;
        }
        return `<a href="/item.html?id=${item.id}" class="gift-card">${inner}</a>`;
      }).join('');
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadItems();

      document.getElementById('filter-tabs').addEventListener('click', e => {
        const tab = e.target.closest('.filter-tab');
        if (!tab) return;
        activeFilter = tab.dataset.cat;
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        renderGrid();
      });
    });
  </script>
</body>
</html>
