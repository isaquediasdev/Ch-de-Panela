<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presente — Chá de Panelas</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .item-img-wrap {
      width: 100%;
      max-width: 320px;
      aspect-ratio: 1 / 1;
      margin: 0 auto 20px;
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
      border: 1px solid var(--border);
      cursor: zoom-in;
      position: relative;
    }
    .item-img { width: 100%; height: 100%; object-fit: contain; display: block; padding: 10px; }
    .item-img-zoom-hint {
      position: absolute; bottom: 8px; right: 8px;
      background: rgba(61,43,31,.72); color: #fff;
      font-size: 0.7rem; padding: 3px 9px; border-radius: 20px;
      pointer-events: none;
    }

    /* ── LIGHTBOX (imagem ampliada) ───────────────────────────── */
    .lightbox-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.88);
      z-index: 300;
      align-items: center; justify-content: center;
      padding: 24px;
      cursor: zoom-out;
    }
    .lightbox-backdrop.open { display: flex; }
    .lightbox-img {
      max-width: 95vw; max-height: 90vh;
      object-fit: contain;
      border-radius: 8px;
      background: #fff;
    }
    .lightbox-close {
      position: absolute; top: 18px; right: 22px;
      background: none; border: none; color: #fff;
      font-size: 2rem; cursor: pointer; line-height: 1;
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">Chá de <span>Panelas</span></a>
      <ul class="nav-links">
        <li><a href="/lista.html">Lista de Presentes</a></li>
        <li><a href="/carrinho.html" class="nav-cart">🛒 Carrinho <span class="cart-badge"></span></a></li>
      </ul>
      <div id="nav-user-area"></div>
    </div>
  </nav>

  <div class="item-detail">
    <a href="/lista.html" class="back-link">← Lista de Presentes</a>

    <div class="item-detail-card" id="item-card">
      <div class="skeleton" style="height:160px;width:160px;border-radius:16px;margin:0 auto 20px;"></div>
      <div class="skeleton" style="height:18px;width:55%;margin:0 auto 10px;"></div>
      <div class="skeleton" style="height:30px;width:80%;margin:0 auto 10px;"></div>
      <div class="skeleton" style="height:14px;width:90%;margin:0 auto 18px;"></div>
      <div class="skeleton" style="height:48px;border-radius:8px;margin-bottom:10px;"></div>
    </div>
  </div>

  <!-- LIGHTBOX (imagem ampliada) -->
  <div class="lightbox-backdrop" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" aria-label="Fechar">✕</button>
    <img class="lightbox-img" id="lightbox-img" src="" alt="" />
  </div>

  <!-- FOOTER -->
  <footer>
    <p class="footer-names" data-config="nomes">Ana Clara &amp; Isaque</p>
  </footer>

  <script src="/js/app.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const itemId = parseInt(params.get('id'), 10);
    const wantsAdd = params.get('add') === '1';
    let autoAddHandled = false;

    async function loadItem() {
      const card = document.getElementById('item-card');
      if (!itemId) { card.innerHTML = `<p style="color:var(--red)">Item não encontrado.</p>`; return; }

      try {
        const [itemRes, meRes] = await Promise.all([
          App.apiFetch(`/api/items/${itemId}`),
          App.apiFetch('/api/auth/me'),
        ]);

        if (!itemRes.ok) { card.innerHTML = `<p style="color:var(--red)">Item não encontrado.</p>`; return; }

        const item = itemRes.data;
        const isLoggedIn = meRes.ok;
        document.title = `${item.name} — Chá de Panelas`;

        let inCart = false;
        if (isLoggedIn) {
          const cartRes = await App.apiFetch('/api/cart');
          if (cartRes.ok) inCart = cartRes.data.some(ci => ci.id === item.id);
        }

        // veio de "Quero presentear" e acabou de logar → adiciona sozinho
        if (wantsAdd && !autoAddHandled && isLoggedIn && !inCart && !item.reserved) {
          autoAddHandled = true;
          const r = await App.apiFetch('/api/cart', { method: 'POST', body: { itemId: item.id } });
          if (r.ok) {
            App.showToast('Presente adicionado ao carrinho! 🎁', 'success');
            App.updateCartCount();
            inCart = true;
          }
          history.replaceState({}, '', '/item.html?id=' + item.id);
        }

        const mediaHtml = item.image
          ? `<div class="item-img-wrap" id="item-img-wrap"><img src="${App.escapeHtml(item.image)}" alt="${App.escapeHtml(item.name)}" class="item-img" /><span class="item-img-zoom-hint">🔍 ampliar</span></div>`
          : `<div class="item-emoji-large">${item.emoji}</div>`;

        const badgeText = item.paid ? 'Comprado' : (item.reserved ? 'Reservado' : 'Disponível');
        const badgeClass = item.reserved ? 'badge-reserved' : 'badge-available';

        let actionHtml = '';
        if (item.reserved) {
          const word = item.paid ? 'comprado' : 'reservado';
          actionHtml = `
            <div class="reserved-msg">
              Este presente já foi ${word} 💝<br>
              <small style="opacity:.8;margin-top:4px;display:block">Que tal escolher outro da lista?</small>
            </div>
            <a href="/lista.html" class="btn btn-outline" style="margin-top:16px;">Ver outros presentes</a>
          `;
        } else if (inCart) {
          actionHtml = `<a href="/carrinho.html" class="btn btn-primary btn-full" style="margin-top:20px;">✓ No carrinho — Ir para o carrinho</a>`;
        } else if (isLoggedIn) {
          actionHtml = `<button class="btn btn-primary btn-full" id="gift-btn" style="margin-top:20px;">💝 Quero presentear</button>`;
        } else {
          const back = encodeURIComponent('/item.html?id=' + item.id + '&add=1');
          actionHtml = `<a href="/cadastro.html?redirect=${back}" class="btn btn-primary btn-full" style="margin-top:20px;">💝 Quero presentear</a>`;
        }

        card.innerHTML = `
          ${mediaHtml}
          <p class="item-category">${App.escapeHtml(item.cat)}</p>
          <h1>${App.escapeHtml(item.name)}</h1>
          <p class="item-desc">${App.escapeHtml(item.desc)}</p>
          <div class="item-price-large">${App.formatPrice(item.price)}</div>
          <div><span class="badge ${badgeClass}">${badgeText}</span></div>
          ${actionHtml}
        `;

        document.getElementById('item-img-wrap')?.addEventListener('click', () => {
          openLightbox(item.image, item.name);
        });

        const giftBtn = document.getElementById('gift-btn');
        if (giftBtn) {
          giftBtn.addEventListener('click', async () => {
            giftBtn.disabled = true;
            giftBtn.textContent = 'Adicionando…';
            const res = await App.apiFetch('/api/cart', { method: 'POST', body: { itemId: item.id } });
            if (res.ok) {
              App.updateCartCount();
              App.showCartCTA(item.name);
              loadItem();
            } else {
              App.showToast(res.error || 'Erro ao adicionar', 'error');
              giftBtn.disabled = false;
              giftBtn.textContent = '💝 Quero presentear';
            }
          });
        }
      } catch {
        card.innerHTML = `<p style="color:var(--red)">Erro ao carregar. Recarregue a página.</p>`;
      }
    }

    function openLightbox(src, alt) {
      const lb = document.getElementById('lightbox');
      const img = document.getElementById('lightbox-img');
      img.src = src; img.alt = alt || '';
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.addEventListener('DOMContentLoaded', loadItem);
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>
</body>
</html>
